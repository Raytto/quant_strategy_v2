name: myqs
channels:
  - defaults
# Notes:
# - Do NOT put secrets (e.g. TuShare token) in this file.
# - Preferred: put `tushare_api_token=...` in `.env` (gitignored). This project loads `.env`
#   at runtime without needing `python-dotenv`.
# - If you want conda-managed env vars instead:
#     conda activate myqs
#     conda env config vars set TUSHARE_API_TOKEN=...   # or tushare_api_token=...
#     conda deactivate && conda activate myqs
dependencies:
  - python=3.11
  - numpy
  - pandas
  - pip
  - pip:
      - tushare==1.4.21
      - matplotlib==3.10.5
      - ipywidgets==8.1.7
      - pytest==8.4.1
      - ipykernel==6.30.0
      - fastapi==0.104.1
      - jinja2==3.1.4
      - itsdangerous==2.2.0
      - uvicorn==0.24.0
      - httpx==0.24.1
